name: ClearPay Fraud Detection — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8==7.0.0
      - name: Lint
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,W504,E501,E402,F401,C901 \
            --exclude=__pycache__,*.pyc
        continue-on-error: true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest==8.2.0
      - name: Run business logic tests
        # Note: --cov=src intentionally omitted.
        # Coverage collection imports ALL src modules including PySpark dependencies
        # which are not available in CI. Full coverage runs in Databricks workspace.
        run: |
          pytest tests/test_business_logic.py -v \
            --tb=short \
            -p no:warnings
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit==1.7.8
      - name: Bandit scan
        run: bandit -r src/ -ll
        continue-on-error: true
