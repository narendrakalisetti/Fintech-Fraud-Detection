name: ClearPay Fraud Detection – CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install flake8==7.0.0

      - name: Lint with flake8
        # W503/W504: line break before/after operator (common in long expressions)
        # E501: line too long (we allow 120)
        # E402: module level import not at top (Databricks notebooks pattern)
        # F401: imported but unused (acceptable in __init__.py)
        # C901: complexity (acceptable in scoring engines)
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,W504,E501,E402,F401,C901 \
            --exclude=__pycache__,*.pyc,.git,.venv \
            --per-file-ignores="tests/*:S101,E501"
        continue-on-error: true  # Lint warnings don't block tests

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    # Tests run independently — not blocked by lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11 (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        env:
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
        run: |
          pytest tests/ -v \
            --ignore=tests/test_integration.py \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            -p no:warnings \
            --tb=short

      - name: Run integration tests
        env:
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
        run: |
          pytest tests/test_integration.py -v \
            --tb=short \
            -p no:warnings
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
